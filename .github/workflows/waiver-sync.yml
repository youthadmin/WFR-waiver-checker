name: WFR Waiver Sync

# Single weekly run: Friday 10:00 AM America/Los_Angeles.
# Plus workflow_dispatch (below) for on-demand reruns from the Actions UI.
#
# Cron in GitHub Actions runs in UTC. The line below targets 17:00 UTC,
# which is 10:00 AM PDT (UTC-7, in effect mid-March through early November).
#
# DST CAVEAT: when Pacific shifts to PST (UTC-8) the first Sunday in
# November, this cron will fire at 09:00 AM PT instead of 10:00 AM PT
# until Pacific shifts back to PDT the second Sunday in March. To keep
# the run at 10:00 AM PT year-round, manually swap the line at each DST
# transition:
#     PDT (Mar–Nov):  - cron: "0 17 * * 5"
#     PST (Nov–Mar):  - cron: "0 18 * * 5"

on:
  schedule:
    - cron: "0 17 * * 5"   # Fri 17:00 UTC → Fri 10:00 PDT (PST: swap to 18:00 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN for this run (overrides the repo variable)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# One run at a time. Late triggers wait rather than overlap — prevents
# two runs trying to toggle the same checkbox if one is slow.
concurrency:
  group: waiver-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25         # 5 min head-room over the in-process 20-min cap

    env:
      # Effective DRY_RUN: manual input > repo variable > safe default "true".
      DRY_RUN: ${{ github.event.inputs.dry_run || vars.DRY_RUN || 'true' }}
      HEADLESS: "true"
      RECORD_VIDEO: "false"

      PCO_CLIENT_ID: ${{ secrets.PCO_CLIENT_ID }}
      PCO_SECRET:    ${{ secrets.PCO_SECRET }}

      SIGNUP_YOUTH_CAMP: "3526683"
      SIGNUP_DREAM_TEAM: "3527418"

      WAIVER_SENDER:  "nharrison@younglife.org"
      WAIVER_SUBJECT: "WFR waiver form"
      NOTIFY_EMAIL:   "youthadmin@mannahouse.church"

      MATCH_THRESHOLD:        "90"
      MAX_ATTENDEES_PER_RUN:  "50"
      RUN_TIMEOUT_MINUTES:    "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Restore credentials and auth state from secrets
        # Each secret is the base64 of the corresponding local file. Decoded
        # to disk at job start, scrubbed at job end (see final step).
        run: |
          set -euo pipefail
          umask 077
          echo "$AUTH_STATE_B64"     | base64 -d > auth_state.json
          echo "$CREDENTIALS_B64"    | base64 -d > credentials.json
          echo "$TOKEN_READONLY_B64" | base64 -d > token.json
          echo "$TOKEN_SEND_B64"     | base64 -d > token_send.json
        env:
          AUTH_STATE_B64:     ${{ secrets.AUTH_STATE_B64 }}
          CREDENTIALS_B64:    ${{ secrets.CREDENTIALS_B64 }}
          TOKEN_READONLY_B64: ${{ secrets.TOKEN_READONLY_B64 }}
          TOKEN_SEND_B64:     ${{ secrets.TOKEN_SEND_B64 }}

      - name: Run waiver sync
        run: python main.py

      - name: Upload run artifacts (logs + audit screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            logs/
            audit/
          if-no-files-found: ignore
          retention-days: 30

      - name: Scrub credentials from runner
        if: always()
        run: |
          rm -f auth_state.json credentials.json token.json token_send.json
